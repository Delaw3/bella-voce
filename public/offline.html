<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bella Voce Offline</title>
    <meta name="theme-color" content="#2CA6A4" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafa;
        color: #1f2937;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 420px);
        border: 1px solid rgba(44, 166, 164, 0.35);
        border-radius: 28px;
        background: white;
        padding: 28px 24px;
        box-shadow: 0 20px 45px rgba(31, 41, 55, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }

      strong {
        color: #1e8c8a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Bella Voce could not reach the network. Static app assets are available, but
        <strong> live balances, payments, approvals, and admin actions </strong>
        still require a connection.
      </p>
    </main>
  </body>
</html>
